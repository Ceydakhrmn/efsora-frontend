name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend'
              - 'backend/**'
              - 'scripts/backend-smoke.sh'

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

  backend-smoke:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init backend submodule (best effort)
        run: git submodule update --init --recursive backend || true

      - name: Check backend availability
        id: backend_available
        run: |
          if [ -f backend/pom.xml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: ${{ steps.backend_available.outputs.available == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run backend smoke script
        if: ${{ steps.backend_available.outputs.available == 'true' }}
        run: |
          chmod +x ./scripts/backend-smoke.sh
          ./scripts/backend-smoke.sh

      - name: Skip backend smoke (submodule unavailable)
        if: ${{ steps.backend_available.outputs.available != 'true' }}
        run: |
          echo "Skipping backend smoke: backend/pom.xml is not available in this workflow run."

  backend:
    needs: [changes, backend-smoke]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init backend submodule (best effort)
        run: git submodule update --init --recursive backend || true

      - name: Check backend availability
        id: backend_available
        run: |
          if [ -f backend/pom.xml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: ${{ steps.backend_available.outputs.available == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make Maven wrapper executable
        if: ${{ steps.backend_available.outputs.available == 'true' }}
        run: chmod +x mvnw

      - name: Run tests
        if: ${{ steps.backend_available.outputs.available == 'true' }}
        run: ./mvnw test

      - name: Skip backend tests (submodule unavailable)
        if: ${{ steps.backend_available.outputs.available != 'true' }}
        run: |
          echo "Skipping backend tests: backend/pom.xml is not available in this workflow run."
