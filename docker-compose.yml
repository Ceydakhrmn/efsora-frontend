services:
  postgres:
    image: postgres:16-alpine
    container_name: efsora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-envanter_db}
      POSTGRES_USER: ${POSTGRES_USER:-efsora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efsora_user} -d ${POSTGRES_DB:-envanter_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: efsora-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-envanter_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-efsora_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-2592000000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      APP_BACKEND_PUBLIC_URL: ${APP_BACKEND_PUBLIC_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
