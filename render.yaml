services:
  - type: web
    name: efsora-backend
    runtime: docker
    dockerfilePath: Dockerfile.backend
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        scope: build
        value: jdbc:postgresql://${POSTGRES_HOST}:5432/envanter_db
      - key: SPRING_DATASOURCE_USERNAME
        scope: run
        value: ${POSTGRES_USER}
      - key: SPRING_DATASOURCE_PASSWORD
        scope: run
        value: ${POSTGRES_PASSWORD}
      - key: JWT_SECRET
        scope: run
        # SECRET: Must be set in Render Dashboard as environment variable
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://efsora-frontend-m3ke.onrender.com
      - key: PORT
        value: "8081"

  - type: web
    name: efsora-frontend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        value: https://envanter-yonetimi-backend.onrender.com
