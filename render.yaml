services:
  - type: web
    name: efsora-backend
    runtime: docker
    dockerfilePath: Dockerfile.backend
    dockerContext: .
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${POSTGRES_HOST}:5432/envanter_db
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        value: ${POSTGRES_USER}
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${POSTGRES_PASSWORD}
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://efsora-frontend-m3ke.onrender.com
        sync: false
      - key: SERVER_PORT
        value: "8081"
        sync: false

  - type: web
    name: efsora-frontend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        value: https://envanter-yonetimi-backend.onrender.com
        sync: false
